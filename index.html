<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор прогулки</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 70px;
            background: #f2f2f2;
        }

        .box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Когда гуляем?</h2>

    <form action="https://formspree.io/f/xaqzbnyb" method="POST">

        <label>Твоё имя</label><br>
        <input 
            type="text" 
            name="Имя"
            required
        >

        <label>Выбери дату</label><br>
        <input 
            type="date" 
            name="Дата"
            required
        >

        <label>Выбери время</label><br>
        <input 
            type="time" 
            name="Время"
            required
        >

        <button type="submit">
            Отправить
        </button>

    </form>
</div>

</body>
</html>
