<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Когда</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #5ecbff, #2f80ed);
}

.card {
    background: white;
    width: 90%;
    max-width: 350px;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 25px;
    color: #333;
}

input, select, button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    margin-top: 20px;
    border: none;
    background: #2f80ed;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2366c4;
}

.step {
    opacity: 0;
    transform: translateY(20px);
    position: absolute;
    width: 100%;
    pointer-events: none;
    transition: 0.4s ease;
}

.step.active {
    opacity: 1;
    transform: translateY(0);
    position: relative;
    pointer-events: all;
}

.time-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
    gap: 10px;
    margin-top: 15px;
}

.time-btn {
    padding: 12px;
    border-radius: 12px;
    border: 2px solid #2f80ed;
    background: white;
    color: #2f80ed;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

.time-btn:hover {
    background: #e7f2ff;
}

.time-btn.selected {
    background: #2f80ed;
    color: white;
}

</style>
</head>

<body>

<div class="card">

<form id="walkForm">

<div class="step active" id="step1">
    <h2>Как тебя зовут?</h2>
    <input type="text" name="Имя" id="name" required>
    <button type="button" onclick="nextStep(2)">
        Далее
    </button>
</div>


<div class="step" id="step2">
    <h2>Когда тебе удобно?</h2>
    <input type="date" name="Дата" id="date" required>
    <button type="button" onclick="nextStep(3)">
        Далее
    </button>
</div>


<div class="step" id="step3">
    <h2>Во сколько?</h2>

    <input type="hidden" name="Время" id="timeInput">

<div class="time-grid">

<button type="button" class="time-btn">12:00</button>
<button type="button" class="time-btn">12:30</button>

<button type="button" class="time-btn">13:00</button>
<button type="button" class="time-btn">13:30</button>

<button type="button" class="time-btn">14:00</button>
<button type="button" class="time-btn">14:30</button>

<button type="button" class="time-btn">15:00</button>
<button type="button" class="time-btn">15:30</button>

<button type="button" class="time-btn">16:00</button>
<button type="button" class="time-btn">16:30</button>

<button type="button" class="time-btn">17:00</button>
<button type="button" class="time-btn">17:30</button>

<button type="button" class="time-btn">18:00</button>
<button type="button" class="time-btn">18:30</button>

<button type="button" class="time-btn">19:00</button>
<button type="button" class="time-btn">19:30</button>

<button type="button" class="time-btn">20:00</button>
<button type="button" class="time-btn">20:30</button>

<button type="button" class="time-btn">21:00</button>
<button type="button" class="time-btn">21:30</button>

<button type="button" class="time-btn">22:00</button>
<button type="button" class="time-btn">22:30</button>

<button type="button" class="time-btn">23:00</button>

</div>

    <button type="button" onclick="sendForm()">
    Отправить
    </button>
</div>

</form>

</div>

<div class="step" id="thanks">
    <h2>Респект</h2>
</div>


<script>
function nextStep(number) {

    if(number === 2 && !document.getElementById("name").value){
        alert("Введи имя");
        return;
    }

    if(number === 3 && !document.getElementById("date").value){
        alert("Выбери дату");
        return;
    }

    document.querySelectorAll(".step")
    .forEach(step => step.classList.remove("active"));

    document.getElementById("step" + number)
    .classList.add("active");
}

async function sendForm() {

    const time = document.getElementById("timeInput");

    if (!time.value) {
        alert("Выбери время");
        return;
    }

    const formData = new FormData(
        document.getElementById("walkForm")
    );

    const response = await fetch(
        "https://formspree.io/f/xaqzbnyb",
        {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            }
        }
    );

    if (response.ok) {

        document.querySelectorAll(".step")
            .forEach(step =>
                step.classList.remove("active")
            );

        document
            .getElementById("thanks")
            .classList.add("active");

    } else {

        alert("Ошибка отправки. Попробуй ещё раз.");

    }
}

const buttons = document.querySelectorAll(".time-btn");
const timeInput = document.getElementById("timeInput");

buttons.forEach(button => {

    button.addEventListener("click", () => {

        buttons.forEach(btn => {
            btn.classList.remove("selected");
        });

        button.classList.add("selected");
        timeInput.value = button.textContent;
    });

});
    
</script>

</body>
</html>
